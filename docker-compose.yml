services:
  # ─── Kafka (KRaft mode, tanpa Zookeeper) ────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: eda-kafka
    ports:
      - "9092:9092"       # untuk koneksi dari host
      - "9094:9094"       # untuk koneksi antar-container
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9094,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─── Kafka UI ────────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: eda-kafka-ui
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9094
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ─── Transaction Generator ───────────────────────────────────────────────────
  generator:
    build:
      context: ./generator
      dockerfile: Dockerfile
    container_name: eda-generator
    environment:
      KAFKA_BROKERS: kafka:9094
      EVENTS_PER_SECOND: ${EVENTS_PER_SECOND:-2}
      ANOMALY_RATIO: ${ANOMALY_RATIO:-0.12}
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ─── Fraud Detector ──────────────────────────────────────────────────────────
  fraud-detector:
    build:
      context: ./fraud-detector
      dockerfile: Dockerfile
    container_name: eda-fraud-detector
    environment:
      KAFKA_BROKERS: kafka:9094
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ─── Backend API + WebSocket ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eda-backend
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      KAFKA_BROKERS: kafka:9094
      PORT: 3001
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ─── Dashboard UI ────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eda-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  kafka_data:
    driver: local
